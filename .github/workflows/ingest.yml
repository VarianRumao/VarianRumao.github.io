name: Job tracker ingest

# Free on GitHub-hosted runners (public repos = unlimited minutes).
on:
  schedule:
    - cron: "* * * * *"        # every minute (GitHub Actions minimum)
  workflow_dispatch: {}        # run instantly from Actions tab

# allow the job to commit the refreshed data file back to the repo
permissions:
  contents: write

concurrency:
  group: job-tracker-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run ingest
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          TRACKER_PASSPHRASE: ${{ secrets.TRACKER_PASSPHRASE }}
        run: python scripts/ingest.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/applications.enc.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh job tracker data [skip ci]"
            git push
          fi
